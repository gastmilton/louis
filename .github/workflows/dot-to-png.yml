name: Convert DOT to PNG

on:
  push:
    paths:
      - 'proto1/*.dot'
  workflow_dispatch:

jobs:
  convert:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      
      - name: Install Graphviz
        run: sudo apt-get install -y graphviz
      
      - name: Create output directory
        run: mkdir -p png
      
      - name: Convert DOT files to PNG
        run: |
          for file in proto1/*.dot; do
            filename=$(basename "$file" .dot)
            dot -Tpng "$file" -o "png/${filename}.png"
          done
      
      - name: Push to build repo
        env:
          BUILD_REPO_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          git clone https://github.com/gastmilton/louis-build.git build-repo
          cp -r png/* build-repo/
          cd build-repo
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add .
          git commit -m "Generate PNG from DOT files" || echo "No changes to commit"
          git push https://x-access-token:${BUILD_REPO_TOKEN}@github.com/gastmilton/louis-build.git
          
